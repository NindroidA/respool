services:
  app:
    build: .
    container_name: respool-app
    ports:
      - "127.0.0.1:3847:3847"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://respool:${DB_PASSWORD}@respool-db:5432/respool
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3847/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:17-alpine
    container_name: respool-db
    environment:
      POSTGRES_USER: respool
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: respool
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U respool"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
