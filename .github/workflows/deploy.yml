name: Deploy to Prizmo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and deploy with Docker Compose
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          OAUTH_GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
          OAUTH_GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
          OAUTH_GOOGLE_CLIENT_ID: ${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}
          OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
          APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
        run: |
          # Write .env for docker-compose
          cat > .env << EOF
          DB_PASSWORD=${DB_PASSWORD}
          DATABASE_URL=postgresql://respool:${DB_PASSWORD}@db:5432/respool
          BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
          BETTER_AUTH_URL=${BETTER_AUTH_URL}
          GITHUB_CLIENT_ID=${OAUTH_GITHUB_CLIENT_ID}
          GITHUB_CLIENT_SECRET=${OAUTH_GITHUB_CLIENT_SECRET}
          GOOGLE_CLIENT_ID=${OAUTH_GOOGLE_CLIENT_ID}
          GOOGLE_CLIENT_SECRET=${OAUTH_GOOGLE_CLIENT_SECRET}
          NEXT_PUBLIC_APP_URL=${APP_URL}
          EOF

          # Build and restart
          docker compose build --no-cache
          docker compose up -d

          # Clean up dangling images
          docker image prune -f

      - name: Health check
        run: |
          echo "Waiting for app to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "App is healthy!"
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed"
          docker compose logs app --tail 50
          exit 1
